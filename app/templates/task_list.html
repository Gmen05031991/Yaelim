{% extends "base.html" %}
<a href="/tasks/{{ task.id }}/edit" class="text-blue-600 hover:underline text-xs">ערוך</a>

{% block content %}
<div class="max-w-4xl mx-auto mt-8 space-y-6">
  <h1 class="text-xl font-bold text-gray-800 text-center">רשימת משימות</h1>

  <!-- Task Form -->
  <form method="post" action="/tasks/add" class="bg-white p-4 rounded shadow space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-gray-600">כותרת</label>
        <input type="text" name="title" class="w-full border p-2 rounded text-sm" required>
      </div>
      <div>
        <label class="block text-sm text-gray-600">תאריך יעד</label>
        <input type="date" name="due_date" class="w-full border p-2 rounded text-sm" required>
      </div>
      <div>
        <label class="block text-sm text-gray-600">סטטוס</label>
        <select name="status" class="w-full border p-2 rounded text-sm" required>
          <option value="פתוח">פתוח</option>
          <option value="בוצע">בוצע</option>
        </select>
      </div>
      <div>
        <label class="block text-sm text-gray-600">עובד</label>
        <input type="number" name="employee_id" class="w-full border p-2 rounded text-sm" placeholder="מספר מזהה עובד" required>
      </div>
    </div>
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">הוסף משימה</button>
  </form>

  <!-- Task Table -->
  <div class="bg-white p-4 rounded shadow">
    <table class="min-w-full text-sm">
      <thead>
        <tr class="border-b">
          <th class="p-2 text-right">כותרת</th>
          <th class="p-2 text-right">תאריך יעד</th>
          <th class="p-2 text-right">סטטוס</th>
          <th class="p-2 text-right">מזהה עובד</th>
        </tr>
      </thead>
      <tbody>
        {% for task in tasks %}
        <tr class="border-b">
          <td class="p-2">{{ task.title }}</td>
          <td class="p-2">{{ task.due_date }}</td>
          <td class="p-2">{{ task.status }}</td>
          <td class="p-2">{{ task.employee_id }}</td>
        </tr>
        {% else %}
        <tr>
          <td colspan="4" class="text-center text-gray-500 p-4">אין משימות להצגה</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
