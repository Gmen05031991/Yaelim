<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>הוסף עובד חדש</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-body">
        <h4 class="card-title text-center mb-4 fw-bold">הוסף עובד חדש</h4>
        <form method="post" action="/employees/add" class="row g-3">
{% if error %}
  <div class="alert alert-danger text-center fw-bold">
    {{ error }}
  </div>
{% endif %}
          <div class="col-md-6">
            <label for="internal_id" class="form-label">מספר עובד</label>
            <input type="text" class="form-control" name="internal_id" required>
          </div>

          <div class="col-md-6">
            <label for="first_name" class="form-label">שם פרטי</label>
            <input type="text" class="form-control" name="first_name" required>
          </div>

          <div class="col-md-6">
            <label for="last_name" class="form-label">שם משפחה</label>
            <input type="text" class="form-control" name="last_name" required>
          </div>

          <div class="col-md-6">
            <label for="phone" class="form-label">טלפון</label>
            <input type="text" class="form-control" name="phone" required>
          </div>

          <div class="col-md-6">
            <label for="birth_date" class="form-label">תאריך לידה</label>
            <input type="date" class="form-control" name="birth_date" required>
          </div>

          <div class="col-md-6">
            <label for="visa_expiry" class="form-label">תוקף ויזה</label>
            <input type="date" class="form-control" name="visa_expiry" required>
          </div>

          <div class="col-md-6">
            <label for="passport_number" class="form-label">דרכון/ויזה</label>
            <input type="text" class="form-control" name="passport_number" required>
          </div>

          <div class="col-md-6">
            <label for="address" class="form-label">כתובת</label>
            <input type="text" class="form-control" name="address" required>
          </div>

          <div class="col-md-6">
            <label for="status" class="form-label">סטטוס</label>
            <select name="status" class="form-select" required>
              <option value="עובד" selected>עובד</option>
              <option value="סיים">סיים</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="company_id" class="form-label">חברה</label>
            <select name="company_id" class="form-select" required>
              {% for company in companies %}
                <option value="{{ company.id }}">{{ company.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="col-12 d-flex justify-content-between mt-4">
            <a href="/employees" class="btn btn-danger">ביטול</a>
            <button type="submit" class="btn btn-success">שמור</button>
          </div>

        </form>
      </div>
    </div>
  </div>
</body>
</html>
