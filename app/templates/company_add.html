<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>הוספת חברה</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-lg font-bold mb-4">הוסף חברה</h1>
    <form method="post">
      <input name="name" placeholder="שם החברה" class="border p-2 w-full rounded">
      <div class="mt-4 flex gap-4">
        <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">שמור</button>
        <a href="/companies" class="inline-block text-sm text-gray-600 hover:underline">← חזור</a>
      </div>
    </form>
  </div>
</body>
</html>
